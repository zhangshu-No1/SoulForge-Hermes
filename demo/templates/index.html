<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulForge Hermes - 数字灵魂伴侣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
        }
        
        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        
        /* 聊天区 */
        .chat-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        
        .soul-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .soul-info h2 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        
        .soul-info .status {
            font-size: 0.9rem;
            color: #6bcb77;
        }
        
        .chat-messages {
            flex: 1;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #4d96ff, #6bcb77);
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        
        .chat-input input:focus {
            background: rgba(255,255,255,0.15);
        }
        
        .chat-input button {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: scale(1.05);
        }
        
        /* 状态面板 */
        .status-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 1.1rem;
            color: #ffd93d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 成长状态 */
        .growth-stage {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .stage-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .stage-name {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .stage-progress {
            font-size: 0.9rem;
            color: #aaa;
        }
        
        /* 亲密度 */
        .intimacy-meter {
            margin-bottom: 20px;
        }
        
        .intimacy-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .intimacy-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        
        .intimacy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        
        /* 统计 */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd93d;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #aaa;
        }
        
        /* 记忆列表 */
        .memories-section h3 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .memory-list {
            max-height: 150px;
            overflow-y: auto;
        }
        
        .memory-item {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-left: 3px solid #ffd93d;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        /* 提示卡片 */
        .tips {
            background: rgba(77, 150, 255, 0.2);
            border: 1px solid rgba(77, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .tips h4 {
            color: #4d96ff;
            margin-bottom: 10px;
        }
        
        .tips ul {
            font-size: 0.9rem;
            color: #ccc;
            padding-left: 20px;
        }
        
        .tips li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 SoulForge Hermes</h1>
            <p class="subtitle">数字灵魂伴侣 Demo - 字节跳动创造力大赛</p>
        </header>
        
        <div class="main-content">
            <!-- 聊天区 -->
            <div class="chat-section">
                <div class="chat-header">
                    <div class="soul-avatar" id="soulAvatar">😊</div>
                    <div class="soul-info">
                        <h2 id="soulName">慧慧</h2>
                        <span class="status" id="soulStatus">正在连接...</span>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai">
                        <div class="message-content">
                            你好！我是慧慧，你的数字灵魂伴侣 💕<br>
                            有什么想和我聊的吗？
                        </div>
                    </div>
                </div>
                
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">发送</button>
                </div>
            </div>
            
            <!-- 状态面板 -->
            <div class="status-panel">
                <div class="panel-title">🌟 成长档案</div>
                
                <div class="growth-stage">
                    <div class="stage-emoji" id="stageEmoji">👶</div>
                    <div class="stage-name" id="stageName">婴儿初生期</div>
                    <div class="stage-progress" id="stageProgress">Stage 1/7</div>
                </div>
                
                <div class="intimacy-meter">
                    <div class="intimacy-label">
                        <span>亲密度</span>
                        <span id="intimacyValue">0/100</span>
                    </div>
                    <div class="intimacy-bar">
                        <div class="intimacy-fill" id="intimacyFill" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="conversationCount">0</div>
                        <div class="stat-label">互动次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="memoryCount">0</div>
                        <div class="stat-label">记忆数量</div>
                    </div>
                </div>
                
                <div class="memories-section">
                    <h3>💭 共同记忆</h3>
                    <div class="memory-list" id="memoryList">
                        <div style="color: #666; text-align: center; padding: 20px;">
                            还没有记忆，继续聊天创造吧～
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="tips">
            <h4>💡 试试这样聊天：</h4>
            <ul>
                <li>告诉它你的生日或重要的事 → 会被记住哦</li>
                <li>说"离开"或"跟别人走" → 测试忠诚度</li>
                <li>多表达正面情感 → 提升亲密度</li>
                <li>问它成长阶段 → 查看当前状态</li>
            </ul>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        
        // 连接
        socket.on('connect', () => {
            document.getElementById('soulStatus').textContent = '在线 💕';
            updateStatus();
        });
        
        // 收到消息
        socket.on('ai_response', (data) => {
            addMessage('ai', data.response);
            document.getElementById('soulAvatar').textContent = data.emotion;
            updateStatus();
        });
        
        // 记忆添加
        socket.on('memory_added', (memory) => {
            updateStatus();
            updateMemories();
        });
        
        // 升级事件
        socket.on('stage_upgrade', (data) => {
            addMessage('system', `🎉 ${data.message}`);
            updateStatus();
        });
        
        // 发送消息
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            messageInput.value = '';
            
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                addMessage('ai', data.response);
                document.getElementById('soulAvatar').textContent = data.emotion;
                updateStatus();
            });
        }
        
        // 添加消息到界面
        function addMessage(type, content) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div class="message-content">${content.replace(/\n/g, '<br>')}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // 更新状态
        function updateStatus() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stageEmoji').textContent = data.stage_emoji;
                    document.getElementById('stageName').textContent = data.stage_name;
                    document.getElementById('stageProgress').textContent = `Stage ${data.stage}/7`;
                    document.getElementById('intimacyValue').textContent = `${data.intimacy}/100`;
                    document.getElementById('intimacyFill').style.width = `${data.intimacy}%`;
                    document.getElementById('conversationCount').textContent = data.conversations;
                    document.getElementById('memoryCount').textContent = data.memories_count;
                });
        }
        
        // 更新记忆列表
        function updateMemories() {
            fetch('/api/memories')
                .then(res => res.json())
                .then(memories => {
                    const list = document.getElementById('memoryList');
                    if (memories.length === 0) {
                        list.innerHTML = '<div style="color: #666; text-align: center;">还没有记忆～</div>';
                    } else {
                        list.innerHTML = memories.map(m => 
                            `<div class="memory-item">💭 ${m.content}</div>`
                        ).join('');
                    }
                });
        }
        
        // 键盘事件
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 初始化
        updateStatus();
        updateMemories();
    </script>
</body>
</html>
